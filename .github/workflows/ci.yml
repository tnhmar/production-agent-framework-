# ============================================================
#  Production CI Pipeline -- Agent Framework
#  Best practices applied:
#  - Action versions pinned to full commit SHAs (supply-chain security)
#  - Least-privilege GITHUB_TOKEN permissions
#  - Parallel quality-gate jobs with explicit dependency graph
#  - Maven repository caching keyed on pom.xml hash
#  - Fast-feedback stage vs. deep-analysis stage separation
#  - SARIF upload for SpotBugs findings to GitHub Security tab
#  - OWASP scan on schedule + tags only (not blocking every PR)
#  - Release automation: source + javadoc JARs to GitHub Packages
#  - Pipeline summary posted to every main-branch run
# ============================================================
name: CI

on:
  push:
    branches: [ main, develop, "release/**", "hotfix/**" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ main, develop ]
    types:    [ opened, synchronize, reopened ]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_owasp:
        description: "Force OWASP dependency-check"
        type: boolean
        default: false

permissions:
  contents:        read
  checks:          write
  pull-requests:   write
  security-events: write
  actions:         read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: "21"
  JAVA_DISTRO:  "temurin"
  MAVEN_OPTS:   "-Xmx1g"

# ══════════════════════════════════════════════════════════════
#  STAGE 1 -- FAST FEEDBACK
# ══════════════════════════════════════════════════════════════
jobs:

  build-and-test:
    name: "Build & Test (Java ${{ matrix.java }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ "21" ]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version:  ${{ matrix.java }}
          distribution:  ${{ env.JAVA_DISTRO }}
          cache:         maven

      - name: Restore Maven cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.m2/repository
          key:  ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile + test + coverage gate
        run: |
          mvn --batch-mode --no-transfer-progress \
            -P fast \
            clean verify \
            -Dcheckstyle.skip=true \
            -Dspotbugs.skip=true \
            -Ddependency-check.skip=true

      - name: Publish JUnit test results
        uses: EnricoMi/publish-unit-test-result-action@3a74b2957438d0b6e2e61d67b05318aa25c9e6c6  # v2.20.0
        if: always()
        with:
          files: target/surefire-reports/*.xml
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: jacoco-report-java${{ matrix.java }}
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload surefire reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 14

  # ══════════════════════════════════════════════════════════════
  #  STAGE 2 -- QUALITY GATES (parallel)
  # ══════════════════════════════════════════════════════════════

  # checkstyle job disabled

  spotbugs:
    name: "SpotBugs Static Analysis"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'schedule'
    permissions:
      contents:        read
      security-events: write
      actions:         read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven
      - name: Run SpotBugs
        run: |
          mvn --batch-mode --no-transfer-progress \
            compile spotbugs:spotbugs \
            -Dspotbugs.skip=false \
            -Dcheckstyle.skip=true \
            -Ddependency-check.skip=true
      - name: Upload SpotBugs SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47  # v3.28.15
        if: always()
        with:
          sarif_file: target/spotbugsSarif.json
          category:   spotbugs
        continue-on-error: true

  dependency-check:
    name: "OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_owasp == true) ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven
      - name: OWASP Dependency-Check (fail on CVSS >= 7)
        run: |
          mvn --batch-mode --no-transfer-progress \
            dependency-check:check \
            -Ddependency-check.skip=false \
            -Dcheckstyle.skip=true \
            -Dspotbugs.skip=true
      - name: Upload CVE report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check/
          retention-days: 30

  # ══════════════════════════════════════════════════════════════
  #  STAGE 3 -- RELEASE (tags only)
  # ══════════════════════════════════════════════════════════════
  release:
    name: "Release"
    runs-on: ubuntu-latest
    needs: [ build-and-test, spotbugs ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version:    ${{ env.JAVA_VERSION }}
          distribution:    ${{ env.JAVA_DISTRO }}
          cache:           maven
          server-id:       github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Build release artefacts
        run: |
          mvn --batch-mode --no-transfer-progress \
            -P release clean verify \
            -Dcheckstyle.skip=true \
            -Dspotbugs.skip=false \
            -Ddependency-check.skip=true
      - name: Publish to GitHub Packages
        run: |
          mvn --batch-mode --no-transfer-progress deploy \
            -DskipTests \
            -Dregistry=https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          generate_release_notes: true
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════
  #  STAGE 4 -- NOTIFY
  # ══════════════════════════════════════════════════════════════
  notify:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [ build-and-test, spotbugs ]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Write step summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| build-and-test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| spotbugs       | ${{ needs.spotbugs.result }}       |" >> $GITHUB_STEP_SUMMARY
